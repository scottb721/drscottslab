<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Scott's Lab</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:white;
text-align:center;
background:black;
}

.hero{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("lab-mobile.jpg");
background-size:cover;
background-position:center;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.content{
position:relative;
z-index:2;
padding:20px;
max-width:600px;
}

h1{
font-size:3rem;
margin-bottom:10px;
}

.tagline{
font-size:1.4rem;
font-style:italic;
margin-bottom:30px;
}

.buttons{
display:flex;
flex-direction:column;
gap:15px;
}

.button{
display:inline-block;
padding:15px 30px;
border-radius:12px;
text-decoration:none;
font-size:1.2rem;
font-weight:bold;
color:white;
background:#2f6df6;
transition:0.2s;
}

.button:hover{
background:#1e4ed8;
}

/* Desktop */

@media(min-width:800px){

.hero{
background-image:url("lab-bg.jpg");
}

h1{
font-size:4rem;
}

.tagline{
font-size:1.6rem;
}

.buttons{
flex-direction:row;
justify-content:center;
}

}

/* Move text higher on phones */

@media(max-width:700px){

.content{
margin-top:-120px;
}

}

</style>
</head>

<body>

<div class="hero">

<div class="overlay"></div>

<div class="content">

<h1>Dr Scott's Lab</h1>

<div class="tagline">
Come up to the lab and see what's on the slab
</div>

<div class="buttons">

<a class="button" href="https://scottsrockinpix.com">
Scott's Rockin' Pix
</a>

<a class="button" href="https://seerr.yourdomain.com">
Plex Seerr
</a>

</div>

</div>

</div>

</body>
</html>
