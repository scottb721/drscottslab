<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Scott's Lab</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    text-align:center;
    background-image:url("lab-bg.jpg");
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.40);
}

.container{
    position:relative;
    z-index:2;
    margin-top:12vh;
    max-width:900px;
    padding:20px;
}

h1{
    font-size:5rem;
    margin:0;
}

.tagline{
    font-size:1.6rem;
    font-style:italic;
    margin-top:20px;
    margin-bottom:40px;
}

.button{
    display:inline-block;
    padding:16px 36px;
    font-size:1.3rem;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    border-radius:12px;
    transition:0.25s;
    margin:10px;
}

.button:hover{
    background:#2563eb;
}

/* MOBILE */

@media (max-width:768px){

body{
    background-image:url("lab-bg-mobile.jpg");
}

.container{
    margin-top:2vh;
}

h1{
    font-size:3rem;
}

.tagline{
    font-size:1.2rem;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Dr Scott's Lab</h1>

<div class="tagline">
Come up to the lab and see what's on the slab
</div>

<a class="button" href="https://seerr.drscottslab.com">
Plex Watchlist Seerr
</a>

<a class="button" href="https://scottsrockinpix.com" target="_blank">
Scott's Rockin' Pix
</a>

</div>

</body>
</html>
