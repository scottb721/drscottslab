<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr Scott's Lab</title>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
      text-align:center;
      background-image:url("/images/lab-bg.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.40);
    }

    .container{
      position:relative;
      z-index:2;
      margin-top:12vh;
      max-width:900px;
      padding:20px;
    }

    h1{
      margin:0;
      font-size:5rem;
      line-height:1;
      text-shadow:0 4px 18px rgba(0,0,0,0.65);
    }

    .tagline{
      font-size:1.6rem;
      font-style:italic;
      margin-top:20px;
      margin-bottom:40px;
      text-shadow:0 3px 14px rgba(0,0,0,0.7);
    }

    .buttons{
      display:flex;
      gap:18px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .button{
      display:inline-block;
      padding:16px 34px;
      font-size:1.2rem;
      font-weight:bold;
      text-decoration:none;
      border-radius:14px;
      transition:0.2s;
      box-shadow:0 8px 24px rgba(0,0,0,0.35);
    }

    .button-primary{
      background:#3b82f6;
      color:white;
    }

    .button-primary:hover{
      background:#2563eb;
    }

    .button-secondary{
      background:rgba(255,255,255,0.18);
      color:white;
      border:1px solid rgba(255,255,255,0.25);
      backdrop-filter:blur(4px);
    }

    .button-secondary:hover{
      background:rgba(255,255,255,0.26);
    }

    @media (max-width:768px){
      body{
        background-image:url("/images/lab-bg-mobile.jpg");
        background-position:center top;
      }

      .container{
        margin-top:2vh;
        padding:18px;
      }

      h1{
        font-size:3rem;
      }

      .tagline{
        font-size:1.2rem;
        margin-bottom:28px;
      }

      .buttons{
        gap:12px;
      }

      .button{
        font-size:1rem;
        padding:14px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dr Scott's Lab</h1>

    <div class="tagline">
      Come up to the lab and see what's on the slab
    </div>

    <div class="buttons">
      <a class="button button-primary" href="/lab/">Enter The Lab</a>
      <a class="button button-secondary" href="https://pix.drscottslab.com" target="_blank">Scott's Rockin' Pix</a>
    </div>
  </div>
</body>
</html>
