<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome To The Lab</title>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
      background:
        linear-gradient(rgba(7,10,18,0.86), rgba(7,10,18,0.92)),
        url("lab-bg.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      min-height:100vh;
    }

    .wrap{
      max-width:1000px;
      margin:0 auto;
      padding:40px 20px 60px;
      text-align:center;
    }

    h1{
      margin:0 0 10px;
      font-size:3.4rem;
    }

    .sub{
      font-size:1.2rem;
      color:rgba(255,255,255,0.82);
      margin-bottom:34px;
    }

    .top-link{
      display:inline-block;
      margin-bottom:34px;
      color:white;
      text-decoration:none;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.18);
      padding:12px 22px;
      border-radius:12px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
      gap:18px;
      margin-top:10px;
    }

    .card{
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:18px;
      padding:24px 18px;
      backdrop-filter:blur(6px);
      box-shadow:0 8px 24px rgba(0,0,0,0.28);
    }

    .card h2{
      margin:0 0 10px;
      font-size:1.25rem;
    }

    .card p{
      margin:0 0 18px;
      color:rgba(255,255,255,0.80);
      line-height:1.5;
      font-size:0.96rem;
    }

    .button{
      display:inline-block;
      padding:14px 24px;
      background:#3b82f6;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      transition:0.2s;
    }

    .button:hover{
      background:#2563eb;
    }

    @media (max-width:768px){
      body{
        background-image:
          linear-gradient(rgba(7,10,18,0.88), rgba(7,10,18,0.94)),
          url("lab-bg-mobile.jpg");
        background-position:center top;
      }

      .wrap{
        padding:28px 16px 40px;
      }

      h1{
        font-size:2.4rem;
      }

      .sub{
        font-size:1rem;
        margin-bottom:24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="top-link" href="index.html">← Back to Main Page</a>

    <h1>Enter The Lab</h1>
    <div class="sub">Links to cool shit.</div>

    <div class="grid">
      

      <div class="card">
        <h2>Plex Seerr</h2>
        <p>Request new content through Seerr.</p>
        <a class="button" href="https://seerr.drscottslab.com" target="_blank">Open Plex Seerr</a>
      </div>
    </div>
  </div>
</body>
</html>
