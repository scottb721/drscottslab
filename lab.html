<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Scott's Lab</title>

<style>

body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;

  background-image:url("lab-bg.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:30px;
  margin-bottom:10px;
}

.subtitle{
  font-size:20px;
  opacity:0.85;
  margin-bottom:50px;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:30px;
}

.card{
  backdrop-filter: blur(12px);
  background: rgba(30,40,60,0.6);
  border-radius:20px;
  padding:35px;
}

.card h2{
  margin-top:0;
}

.button{
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  background:#3b82f6;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.button:hover{
  background:#2563eb;
}

/* dual button layout */

.dual-buttons{
  display:flex;
  gap:12px;
  margin-top:20px;
}

.button.half{
  flex:1;
}

/* back button */

.back{
  display:inline-block;
  margin-bottom:40px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(255,255,255,0.15);
  text-decoration:none;
  color:white;
}

.back:hover{
  background:rgba(255,255,255,0.25);
}

</style>
</head>

<body>

<div class="container">

<a class="back" href="index.html">← Back to Main Page</a>

<h1>Welcome To The Lab</h1>
<p class="subtitle">Links to cool shit.</p>

<div class="grid">

<div class="card">
<h2>Plex Seerr</h2>
<p>Link your Plex watchlist to Seerr.</p>
<a class="button" href="https://seerr.drscottslab.com" target="_blank">Open Plex Seerr</a>
</div>

<div class="card">
<h2>YouTube Downloads</h2>
<p>Download videos or access finished files.</p>

<div class="dual-buttons">
<a class="button half" href="https://metube.drscottslab.com/" target="_blank">Downloader</a>
<a class="button half" href="https://gofile.me/75KEu/FEOEeaoVx" target="_blank">Files</a>
</div>

</div>

</div>

</div>

</body>
</html>
